spring.application.name=notification
server.port=${SERVER_PORT:8181}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/NotificationDB}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin@123}
#spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.h2.console.enabled=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001,http://localhost:4200}

# Root logger level
logging.level.root=info

# Logback Appender configuration for STDOUT
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level %logger{36} [%M:%L] - %msg%n
# Logback Appender - STDOUT
logging.appender.console.name=STDOUT
logging.appender.console.class=ch.qos.logback.core.ConsoleAppender
logging.appender.console.encoder.pattern=%d{yyyy-MM-dd HH:mm:ss} - %-5level %logger{36} [%M:%L] - %msg%n

logging.level.com.example=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

notification.queue.name= notification.queue
notification.exchange.name=notification.exchange
notification.routing.key=notification.routing.key